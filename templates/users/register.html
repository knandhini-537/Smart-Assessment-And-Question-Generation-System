{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Register - Quiz Buzz{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-primary text-white text-center py-4">
                <h3 class="fw-bold mb-0">Create Account</h3>
                <p class="mb-0 opacity-75">Join the Quiz Buzz community</p>
            </div>
            <div class="card-body p-4 p-lg-5">
                <form method="POST" id="registrationForm" novalidate>
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-12">
                            {{ form|crispy }}
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-pill">
                            Create Account
                        </button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <p class="text-secondary small mb-0">
                        Already have an account? <a href="{% url 'login' %}"
                            class="text-primary fw-bold text-decoration-none">Login here</a>
                    </p>
                </div>
            </div>
        </div>
        <div class="text-center mt-4">
            <a href="{% url 'dashboard' %}" class="text-secondary text-decoration-none small">
                <i class="fas fa-arrow-left me-1"></i> Back to Home
            </a>
        </div>
    </div>
</div>

<script>
    document.getElementById('registrationForm').addEventListener('submit', function (event) {
        // Simple client-side validation for password matching if fields exist
        const passwordField = document.querySelector('input[type="password"][name="password"]');
        const confirmField = document.querySelector('input[type="password"][name*="confirm"]');

        if (passwordField && confirmField && passwordField.value !== confirmField.value) {
            alert("Passwords do not match!");
            event.preventDefault();
        }
    });
</script>
{% endblock %}
