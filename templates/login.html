<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{background:#eef2f7;font-family:Arial}
.card{background:white;width:350px;margin:100px auto;padding:30px;border-radius:10px;box-shadow:0 0 15px #ccc}
input,button{width:100%;padding:10px;margin:10px 0}
button{background:#16a34a;color:white;border:none}
</style>
</head>

<body>
<div style="background:#494084;color:white;padding:15px;text-align:center;font-size:22px;">
        Smart Assessment and Question Generation System
</div>
        
<div class="card">
<h2>Login</h2>

{% for msg in messages %}
<p style="color:red">{{msg}}</p>
{% endfor %}

<form method="POST">
{% csrf_token %}
<input name="username" placeholder="Username">
<input name="password" type="password" placeholder="Password">
<button>Login</button>
</form>

<p>No account? <a href="/register/">Register</a></p>
</div>
</body>
</html>
